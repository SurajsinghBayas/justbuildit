version: "3.9"

services:
  # ──────────────────────────────────────────────────────────────
  # PostgreSQL
  # ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: justbuildit_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-justbuildit}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Redis
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: justbuildit_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Backend (FastAPI)
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: justbuildit_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8002:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────────────────────────────────────
  # Celery Worker
  # ──────────────────────────────────────────────────────────────
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: justbuildit_celery
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info

  # ──────────────────────────────────────────────────────────────
  # AI Service (FastAPI)
  # ──────────────────────────────────────────────────────────────
  ai_service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: justbuildit_ai
    restart: unless-stopped
    env_file: .env
    ports:
      - "8001:8001"
    volumes:
      - ./ai-service:/app

  # ──────────────────────────────────────────────────────────────
  # Frontend (Next.js)
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: justbuildit_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # ──────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy
  # ──────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: justbuildit_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - ai_service

volumes:
  postgres_data:
